{% extends "base.html" %}
{% load static %}

{% block title %}Payment Failed - RentWheels{% endblock %}

{% block extra_css %}
<style>
  body { background: #f8fafc; }
  .fail-card {
    max-width: 500px;
    margin: 5rem auto;
    background: white;
    border-radius: 20px;
    padding: 3rem;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  }
</style>
{% endblock extra_css %}

{% block content %}
<div class="fail-card">
  <i class="bi bi-x-circle-fill" style="font-size:5rem; color:#ef4444;"></i>
  <h2 class="fw-bold mt-3">Payment Failed</h2>
  <p class="text-muted">Your payment was not completed. Your booking is still pending.</p>
  <a href="/bookings/my/" class="btn btn-warning px-4 mt-2">Try Again</a>
  <a href="/vehicles/" class="btn btn-outline-secondary px-4 mt-2 ms-2">Go Home</a>
</div>
{% endblock %}
