{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success - RentWheels</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f8fafc; font-family:'Segoe UI',sans-serif; }
    .success-card {
      max-width:500px; margin:5rem auto;
      background:white; border-radius:20px;
      padding:3rem; text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.1);
    }
    .check-icon { font-size:5rem; color:#10b981; }
  </style>
</head>
<body>
{% include 'partials/navbar.html' %}
<div class="success-card">
  <div class="check-icon">✅</div>
  <h2 class="fw-bold mt-3">Payment Successful!</h2>
  <p class="text-muted">Your booking has been confirmed.</p>
  {% if ref_id %}
  <div class="alert alert-success">
    <strong>Reference ID:</strong> {{ ref_id }}
  </div>
  {% endif %}
  <div class="alert alert-light">
    <strong>Amount Paid:</strong> Rs {{ amt }}
  </div>
  <a href="/bookings/my/" class="btn btn-primary px-4 mt-2">View My Bookings</a>
  <a href="/vehicles/" class="btn btn-outline-secondary px-4 mt-2 ms-2">Browse More</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
