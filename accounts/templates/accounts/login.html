{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RentWheels</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      font-family: 'Segoe UI', sans-serif;
    }
    .form-container {
      width: 320px;
      border-radius: 0.75rem;
      background-color: rgba(17, 24, 39, 1);
      padding: 2rem;
      color: rgba(243, 244, 246, 1);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .title { text-align: center; font-size: 1.5rem; font-weight: 700; }
    .subtitle { text-align: center; font-size: 0.85rem; color: rgba(156, 163, 175, 1); margin-top: 4px; }
    .input-group { margin-top: 1rem; font-size: 0.875rem; }
    .input-group label { display: block; color: rgba(156, 163, 175, 1); margin-bottom: 4px; }
    .input-group input {
      width: 100%; border-radius: 0.375rem; border: 1px solid rgba(55, 65, 81, 1);
      outline: 0; background-color: rgba(17, 24, 39, 1); padding: 0.75rem 1rem;
      color: rgba(243, 244, 246, 1); transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: rgba(167, 139, 250, 1); }
    .forgot { display: flex; justify-content: flex-end; margin: 6px 0 0 0; }
    .forgot a { color: rgba(243, 244, 246, 1); text-decoration: none; font-size: 13px; }
    .forgot a:hover { text-decoration: underline; }
    .sign {
      display: block; width: 100%; background-color: rgba(167, 139, 250, 1);
      padding: 0.75rem; text-align: center; color: rgba(17, 24, 39, 1);
      border: none; border-radius: 0.375rem; font-weight: 600; margin-top: 1.2rem;
      cursor: pointer; font-size: 1rem; transition: opacity 0.2s;
    }
    .sign:hover { opacity: 0.9; }
    .social-message { display: flex; align-items: center; padding-top: 1.2rem; }
    .line { height: 1px; flex: 1; background-color: rgba(55, 65, 81, 1); }
    .social-message .message {
      padding: 0 0.75rem; font-size: 0.8rem;
      color: rgba(156, 163, 175, 1); white-space: nowrap;
    }
    .social-icons { display: flex; justify-content: center; gap: 12px; margin-top: 1rem; }
    .social-form { margin: 0; padding: 0; }
    .icon {
      background: transparent; border: 1px solid rgba(55, 65, 81, 1);
      border-radius: 6px; padding: 10px 20px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(243, 244, 246, 1); font-size: 0.82rem; font-weight: 500;
      font-family: 'Segoe UI', sans-serif;
    }
    .icon:hover { border-color: rgba(167, 139, 250, 1); background: rgba(167, 139, 250, 0.07); }
    .icon svg { width: 18px; height: 18px; fill: white; display: block; flex-shrink: 0; }
    .signup { text-align: center; font-size: 0.78rem; color: rgba(156, 163, 175, 1); margin-top: 1rem; }
    .signup a { color: rgba(167, 139, 250, 1); text-decoration: none; font-weight: 600; }
    .signup a:hover { text-decoration: underline; }
    .error-msg {
      background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5; border-radius: 6px; padding: 8px 12px; font-size: 0.82rem; margin-top: 1rem;
    }
    .success-msg {
      background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4);
      color: #6ee7b7; border-radius: 6px; padding: 8px 12px; font-size: 0.82rem; margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <p class="title">Welcome Back</p>
    <p class="subtitle">Login to RentWheels Nepal</p>

    {% if messages %}
      {% for message in messages %}
        <div class="{% if message.tags == 'success' %}success-msg{% else %}error-msg{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Your username" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Your password" required>
        <div class="forgot"><a href="#">Forgot Password?</a></div>
      </div>
      <button type="submit" class="sign">Sign In</button>
    </form>

    <div class="social-message">
      <div class="line"></div>
      <p class="message">or continue with</p>
      <div class="line"></div>
    </div>

    <div class="social-icons">
      <form class="social-form" method="POST" action="{% url 'google_login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="/">
        <button type="submit" class="icon" aria-label="Sign in with Google">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
            <path d="M16.318 13.714v5.484h9.078c-0.37 2.354-2.745 6.901-9.078
              6.901-5.458 0-9.917-4.521-9.917-10.099s4.458-10.099
              9.917-10.099c3.109 0 5.193 1.318 6.38 2.464l4.339-4.182c-2.786-2.599-6.396-4.182-10.719-4.182-8.844
              0-16 7.151-16 16s7.156 16 16 16c9.234 0 15.365-6.49
              15.365-15.635 0-1.052-0.115-1.854-0.255-2.651z"/>
          </svg>
          Sign in with Google
        </button>
      </form>
    </div>

    <p class="signup">Don't have an account? <a href="/accounts/register/">Sign up</a></p>
  </div>
</body>
</html>
