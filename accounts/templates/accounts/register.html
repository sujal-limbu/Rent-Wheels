{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RentWheels</title>
  <link rel="stylesheet" href="{% static 'css/register.css' %}">
</head>

<body>

  <!-- Messages -->
  <div class="messages-container">
    {% if messages %}
      {% for message in messages %}
        <div class="{% if message.tags == 'success' %}success-msg{% else %}error-msg{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  </div>

  <div class="form-container">
    <p class="title">Join RentWheels</p>
    <p class="subtitle">Create your free account today</p>

    <form method="POST">
      {% csrf_token %}

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" value="{{ request.POST.username }}" required>
      </div>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" value="{{ request.POST.email }}" required>
      </div>

      <div class="input-group">
        <label for="phone">Phone Number</label>
        <input type="text" name="phone" id="phone" value="{{ request.POST.phone }}">
      </div>

      <div class="row-inputs">
        <div class="input-group">
          <label for="password1">Password</label>
          <input type="password" name="password1" id="password1" required>
        </div>
        <div class="input-group">
          <label for="password2">Confirm</label>
          <input type="password" name="password2" id="password2" required>
        </div>
      </div>

      <button type="submit" class="sign">Create Account</button>
    </form>

    <div class="social-message">
      <div class="line"></div>
      <p class="message">or sign up with</p>
      <div class="line"></div>
    </div>

    <div class="social-icons">
      <form class="social-form" method="POST" action="{% url 'google_login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="/">
        <button type="submit" class="icon" aria-label="Sign up with Google">
          <img src="https://media.wired.com/photos/5926ffe47034dc5f91bed4e8/3:2/w_2560%2Cc_limit/google-logo.jpg"
            height="25px" width="30px" style="border-radius: 50%;" alt="google photo">
          Sign up with Google
        </button>
      </form>
    </div>

    <p class="signup">Already have an account? <a href="/accounts/login/">Sign in</a></p>
  </div>

</body>

</html>
